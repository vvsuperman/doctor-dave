<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>健康管理系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        
        .header { 
            text-align: center; 
            color: white; 
            margin-bottom: 30px;
            padding: 20px;
        }
        .header h1 { font-size: 32px; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); }
        .header p { opacity: 0.9; font-size: 14px; }
        
        .card { 
            background: white; 
            border-radius: 16px; 
            padding: 24px; 
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
        }
        .card h2 { 
            color: #333; 
            margin-bottom: 20px; 
            font-size: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; }
        .stat { 
            text-align: center; 
            padding: 20px 15px; 
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border-radius: 12px;
        }
        .stat-value { font-size: 28px; font-weight: bold; color: #4CAF50; margin-bottom: 5px; }
        .stat-label { font-size: 13px; color: #666; }
        
        .progress-container { margin-top: 20px; }
        .progress-label { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; color: #666; }
        .progress-bar { height: 12px; background: #e0e0e0; border-radius: 6px; overflow: hidden; }
        .progress-fill { 
            height: 100%; 
            background: linear-gradient(90deg, #4CAF50, #8BC34A);
            transition: width 0.5s ease;
            border-radius: 6px;
        }
        .progress-fill.warning { background: linear-gradient(90deg, #FF9800, #FFC107); }
        .progress-fill.danger { background: linear-gradient(90deg, #F44336, #FF5722); }
        
        
        
        .food-list { max-height: 500px; overflow-y: auto; }
        .food-item { 
            display: flex; 
            gap: 15px;
            padding: 16px; 
            border-bottom: 1px solid #f0f0f0;
            transition: background 0.2s;
        }
        .food-item:hover { background: #f8f9fa; }
        .food-item:last-child { border-bottom: none; }
        
        .food-image {
            width: 80px;
            height: 80px;
            border-radius: 8px;
            object-fit: cover;
            background: #f0f0f0;
        }
        .food-info { flex: 1; }
        .food-name { font-weight: 600; color: #333; margin-bottom: 6px; font-size: 16px; }
        .food-meta { font-size: 13px; color: #999; margin-bottom: 6px; }
        .food-nutrition { display: flex; gap: 15px; flex-wrap: wrap; }
        .nutrition-tag {
            background: #f0f0f0;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
            color: #666;
        }
        .nutrition-tag strong { color: #4CAF50; }
        .food-calories { 
            font-size: 18px; 
            font-weight: bold; 
            color: #4CAF50;
            background: #e8f5e9;
            padding: 6px 12px;
            border-radius: 6px;
            height: fit-content;
        }
        
        .empty-state { 
            text-align: center; 
            color: #999; 
            padding: 40px 20px; 
        }
        .empty-state .icon { font-size: 48px; margin-bottom: 15px; opacity: 0.5; }
        
        .loading { text-align: center; padding: 20px; color: #666; }
        .loading .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .date-section { margin-bottom: 30px; }
        .date-header {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }
        
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #333;
            color: white;
            padding: 14px 28px;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            transition: transform 0.3s;
            z-index: 1000;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.success { background: linear-gradient(135deg, #4CAF50, #8BC34A); }
        .toast.error { background: linear-gradient(135deg, #F44336, #FF5722); }
        .toast.loading { background: linear-gradient(135deg, #2196F3, #64B5F6); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏥 Doctor Dave</h1>
            <p>健康管理系统 · 饮食记录助手</p>
        </div>
        
        <!-- 今日汇总 -->
        <div class="card">
            <h2>📊 今日汇总</h2>
            <div class="stats">
                <div class="stat">
                    <div class="stat-value" id="calories">0</div>
                    <div class="stat-label">热量 (kcal)</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="protein">0g</div>
                    <div class="stat-label">蛋白质</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="fat">0g</div>
                    <div class="stat-label">脂肪</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="carbs">0g</div>
                    <div class="stat-label">碳水</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="meals">0</div>
                    <div class="stat-label">餐数</div>
                </div>
            </div>
            
            <div class="progress-container">
                <div class="progress-label">
                    <span>热量摄入进度</span>
                    <span><span id="remaining">0</span> / <span id="target">2000</span> kcal</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="calorie-progress" style="width: 0%"></div>
                </div>
            </div>
        </div>
        
        <!-- 食物记录 -->
        <div class="card">
            <h2>📝 饮食记录</h2>
            <div class="food-list" id="food-list">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>加载中...</p>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Toast 提示 -->
    <div class="toast" id="toast"></div>
    
    <script>
        const API_BASE = '';
        
        // 显示 Toast
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast show ${type}`;
            setTimeout(() => {
                toast.className = 'toast';
            }, 3000);
        }
        
        // 加载数据
        async function loadData() {
            try {
                const res = await fetch(`${API_BASE}/api/summary`);
                const data = await res.json();
                
                document.getElementById('calories').textContent = Math.round(data.calories);
                document.getElementById('protein').textContent = `${Math.round(data.protein)}g`;
                document.getElementById('fat').textContent = `${Math.round(data.fat)}g`;
                document.getElementById('carbs').textContent = `${Math.round(data.carbs)}g`;
                document.getElementById('meals').textContent = data.meal_count;
                document.getElementById('remaining').textContent = Math.round(data.calorie_remaining);
                document.getElementById('target').textContent = data.calorie_target;
                
                const progress = (data.calories / data.calorie_target) * 100;
                const progressBar = document.getElementById('calorie-progress');
                progressBar.style.width = `${Math.min(progress, 100)}%`;
                
                if (progress > 90) {
                    progressBar.className = 'progress-fill danger';
                } else if (progress > 70) {
                    progressBar.className = 'progress-fill warning';
                } else {
                    progressBar.className = 'progress-fill';
                }
                
                loadFoodRecords();
            } catch (e) {
                console.error('加载失败:', e);
                showToast('加载数据失败', 'error');
            }
        }
        
        // 加载食物记录
        async function loadFoodRecords() {
            try {
                const res = await fetch(`${API_BASE}/api/food?days=7`);
                const data = await res.json();
                
                const container = document.getElementById('food-list');
                
                if (data.records.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="icon">🍽️</div>
                            <p>暂无记录</p>
                            <p style="font-size: 13px; margin-top: 10px;">在飞书群发送食物照片开始记录</p>
                        </div>
                    `;
                    return;
                }
                
                // 按日期分组
                const recordsByDate = {};
                data.records.forEach(record => {
                    const date = record.recorded_at.split('T')[0];
                    if (!recordsByDate[date]) {
                        recordsByDate[date] = [];
                    }
                    recordsByDate[date].push(record);
                });
                
                // 生成 HTML
                let html = '';
                for (const [date, records] of Object.entries(recordsByDate)) {
                    const dateStr = new Date(date).toLocaleDateString('zh-CN', {
                        month: 'long',
                        day: 'numeric',
                        weekday: 'long'
                    });
                    
                    html += `<div class="date-section">
                        <div class="date-header">${dateStr} · ${records.length} 餐</div>`;
                    
                    records.forEach(record => {
                        const time = new Date(record.recorded_at).toLocaleTimeString('zh-CN', {hour: '2-digit', minute:'2-digit'});
                        const imageHtml = record.image_path 
                            ? `<img src="${API_BASE}${record.image_path}" class="food-image" alt="${record.food_name}" onerror="this.style.display='none'">`
                            : '<div class="food-image" style="display:flex;align-items:center;justify-content:center;background:#f0f0f0;color:#999;">无图</div>';
                        
                        html += `
                            <div class="food-item">
                                ${imageHtml}
                                <div class="food-info">
                                    <div class="food-name">${record.food_name}</div>
                                    <div class="food-meta">${time} · ${record.meal_type || '未分类'}</div>
                                    <div class="food-nutrition">
                                        <span class="nutrition-tag">蛋白质 <strong>${Math.round(record.protein)}g</strong></span>
                                        <span class="nutrition-tag">脂肪 <strong>${Math.round(record.fat)}g</strong></span>
                                        <span class="nutrition-tag">碳水 <strong>${Math.round(record.carbs)}g</strong></span>
                                    </div>
                                </div>
                                <div class="food-calories">${Math.round(record.calories)} kcal</div>
                            </div>
                        `;
                    });
                    
                    html += '</div>';
                }
                
                container.innerHTML = html;
            } catch (e) {
                console.error('加载记录失败:', e);
                container.innerHTML = '<div class="empty-state"><p>加载失败</p></div>';
            }
        }
        
        // 初始化
        loadData();
        
        // 每分钟刷新
        setInterval(loadData, 60000);
    </script>
</body>
</html>
